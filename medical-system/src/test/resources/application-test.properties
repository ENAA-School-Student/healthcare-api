# ============================================================
#  application-test.properties  (profil "test" avec H2)
#  Emplacement : src/test/resources/application-test.properties
# ============================================================

spring.application.name=medical-system-test

# ── Base de données H2 en mémoire (remplace MySQL pendant les tests) ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──
# "create-drop" : cree les tables au demarrage, les supprime a la fin
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway : DESACTIVE pour les tests (Hibernate gere le schema) ──
spring.flyway.enabled=false
