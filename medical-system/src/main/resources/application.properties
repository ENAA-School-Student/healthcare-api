spring.application.name=medical-system

spring.datasource.url=jdbc:mysql://localhost:3306/healthcare_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui.html

# Clķ secrĶte pour signer les tokens (au moins 32 caractĶres)
jwt.secret=HealthCareSecretKey2025VeryLongSecretKey
# Expiration en millisecondes : 86400000 = 24 heures
jwt.expiration=86400000